name: Build and Release

on:
  push:
    tags:
      - 'v*'  
  workflow_dispatch:  

permissions:
  contents: write  

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔧 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm' 

      - name: 📦 安装依赖
        run: npm install

      - name: 🚀 构建脚本
        run: npm run build 

      - name: 📊 显示构建信息
        run: |
          echo "构建完成！"
          ls -lh automated-script-for-destined-journey.js

      - name: 🏷️ 提取版本号
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(date +'%Y.%m.%d-%H%M%S')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "版本号: $VERSION"

      - name: 📝 生成 Release 说明
        id: release_notes
        run: |
          BUILD_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S %Z')
          cat > release-notes.md << EOF
          # 🎉 命定之旅自动化脚本

          ---

          **构建时间**: ${BUILD_TIME}
          **提交哈希**: ${{ github.sha }}
          EOF

      - name: 🚀 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          files: automated-script-for-destined-journey.js
          body_path: release-notes.md
          name: Release ${{ steps.get_version.outputs.version }}
          tag_name: ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ 完成
        run: |
          echo "🎉 Release 创建成功！"
          echo "📦 版本: ${{ steps.get_version.outputs.version }}"
          echo "🔗 查看: https://github.com/${{ github.repository }}/releases"